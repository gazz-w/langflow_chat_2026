services:
  langflow:
    # Versão fixada (em vez de :latest) para evitar quebras em upgrades surpresa.
    # FASE 2: trocar AUTO_LOGIN para false e adicionar LANGFLOW_SUPERUSER,
    # LANGFLOW_SUPERUSER_PASSWORD e LANGFLOW_SECRET_KEY (exige reemitir a API key).
    image: langflowai/langflow:1.9.3
    volumes:
      - langflow_data:/root/.cache/langflow
    environment:
      - LANGFLOW_AUTO_LOGIN=true
    restart: unless-stopped
    networks:
      - internal

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - internal

  flask:
    build: .
    env_file: .env
    environment:
      DATA_DIR: /data
      RATELIMIT_STORAGE_URI: redis://redis:6379
      ADMIN_HOST: admin.viajandocomananda.com
    volumes:
      - leads_data:/data
    depends_on:
      - langflow
      - redis
    restart: unless-stopped
    networks:
      - internal

  caddy:
    image: caddy:alpine
    ports:
      - "80:80"
      - "443:443"
    env_file: .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    networks:
      - internal

networks:
  internal:

volumes:
  langflow_data:
  leads_data:
  redis_data:
  caddy_data:
  caddy_config:
