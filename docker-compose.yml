# Rotação de logs padrão (evita logs do Docker crescerem sem limite no disco).
# Aplica-se a cada serviço via âncora; vale no próximo recreate de cada container.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  langflow:
    # Versão fixada (em vez de :latest) para evitar quebras em upgrades surpresa.
    # NÃO é auto-atualizado pelo Watchtower (versão fixa + fora da lista dele).
    # FASE 2: trocar AUTO_LOGIN para false e adicionar LANGFLOW_SUPERUSER,
    # LANGFLOW_SUPERUSER_PASSWORD e LANGFLOW_SECRET_KEY (exige reemitir a API key).
    image: langflowai/langflow:1.9.3
    volumes:
      - langflow_data:/root/.cache/langflow
    environment:
      - LANGFLOW_AUTO_LOGIN=true
      # Secret key ESTÁVEL (do .env). Sem isso o Langflow regenera o secret
      # a cada recreate do container e invalida as API keys guardadas no
      # banco (o arquivo do secret auto-gerado vive fora do volume) —
      # foi exatamente o que derrubou o /chat em 2026-07-13.
      - LANGFLOW_SECRET_KEY=${LANGFLOW_SECRET_KEY}
    restart: unless-stopped
    logging: *default-logging
    networks:
      - internal

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    restart: unless-stopped
    logging: *default-logging
    networks:
      - internal

  flask:
    build: .
    env_file: .env
    environment:
      DATA_DIR: /data
      RATELIMIT_STORAGE_URI: redis://redis:6379
      ADMIN_HOST: admin.viajandocomananda.com
    volumes:
      - leads_data:/data
    depends_on:
      - langflow
      - redis
    restart: unless-stopped
    logging: *default-logging
    networks:
      - internal

  caddy:
    image: caddy:alpine
    ports:
      - "80:80"
      - "443:443"
    env_file: .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    logging: *default-logging
    networks:
      - internal

  # Auto-atualização de containers — monitora APENAS Caddy e Redis.
  # Verifica diariamente às 04:00 UTC (baixo fluxo) e remove imagens antigas.
  # Langflow (pinado) e Flask (buildado localmente) ficam de fora de propósito.
  watchtower:
    image: containrrr/watchtower
    command: ananda-caddy-1 ananda-redis-1
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_SCHEDULE=0 0 4 * * *
      - TZ=Etc/UTC
      # O cliente Docker embutido no Watchtower negocia API 1.25 por padrão,
      # abaixo do mínimo do daemon (1.40). Forçar uma versão compatível.
      - DOCKER_API_VERSION=1.40
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    logging: *default-logging

networks:
  internal:

volumes:
  langflow_data:
  leads_data:
  redis_data:
  caddy_data:
  caddy_config:
